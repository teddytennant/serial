name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"
        # If signing secrets aren't configured, fall back to unsigned APK
        continue-on-error: true

      - name: Determine APK path
        id: apk_path
        run: |
          if [ -n "${{ steps.sign_app.outputs.signedReleaseFile }}" ] && [ -f "${{ steps.sign_app.outputs.signedReleaseFile }}" ]; then
            echo "path=${{ steps.sign_app.outputs.signedReleaseFile }}" >> $GITHUB_OUTPUT
            echo "name=serial-${{ github.ref_name }}-signed.apk" >> $GITHUB_OUTPUT
          else
            APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
            echo "path=$APK" >> $GITHUB_OUTPUT
            echo "name=serial-${{ github.ref_name }}.apk" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk_path.outputs.path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
